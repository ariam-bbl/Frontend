<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steen Papier Schaar</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f9f9f9;
        }

        button {
            font-size: 18px;
            padding: 10px 25px;
            margin: 10px;
            cursor: pointer;
        }

        .score-board {
            font-size: 20px;
            margin-bottom: 40px;
        }

        .extra-info {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <h1>Steen, Papier, Schaar</h1>

    <div class="extra-info">
        <p>Jouw score: <span id="playerScore">0</span></p>
        <p>Computer score: <span id="computerScore">0</span></p>
        <p>Highscore: <span id="highscore">0</span></p>
        <p>Win streak: <span id="streak">0</span></p>
        <p>Ronde: <span id="round">0</span></p>
    </div>

    <div class="score-board">
        <p>Computer: <span id="computer">?</span></p>
        <p>Jij: <span id="human">?</span></p>
        <p>Resultaat: <span id="result">Kies een optie!</span></p>
    </div>

    <button id="steen">Steen</button>
    <button id="papier">Papier</button>
    <button id="schaar">Schaar</button>

    <script src="script.js"></script>

</body>
</html>
