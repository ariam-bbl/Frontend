<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steen Papier Schaar</title>

    <style>
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* لوحة النتائج العلوية */
        .extra-info {
            background-color: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: inline-flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .extra-info p {
            margin: 5px 0;
            font-weight: bold;
            color: #7f8c8d;
        }

        .extra-info span {
            color: #2980b9;
            font-size: 1.2rem;
        }

        /* لوحة المواجهة الحالية */
        .score-board {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto 40px auto;
        }

        .score-board p {
            font-size: 18px;
            margin: 10px 0;
        }

       
        #result {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
            display: block;
            margin-top: 15px;
            padding: 5px;
        }

       
        button {
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            color: white;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        
        #steen { background-color: #95a5a6; }
        #papier { background-color: #3498db; } 
        #schaar { background-color: #e74c3c; } 

        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <h1>Steen, Papier, Schaar</h1>

    <div class="extra-info">
        <p>Jouw score: <span id="playerScore">0</span></p>
        <p>Computer score: <span id="computerScore">0</span></p>
        <p>Highscore: <span id="highscore">0</span></p>
        <p>Win streak: <span id="streak">0</span></p>
        <p>Ronde: <span id="round">0</span></p>
    </div>

    <div class="score-board">
        <p>Computer: <span id="computer">?</span></p>
        <p>Jij: <span id="human">?</span></p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p><span id="result">Kies een optie!</span></p>
    </div>

    <button id="steen">🪨 Steen</button>
    <button id="papier">📄 Papier</button>
    <button id="schaar">✂️ Schaar</button>

    <script src="script.js"></script>

</body>
</html>
